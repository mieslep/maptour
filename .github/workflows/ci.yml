name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Run unit tests with coverage
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          JS_SIZE=$(wc -c < dist/maptour.js)
          # Allow up to 600KB uncompressed (roughly 200KB gzipped)
          MAX_SIZE=614400
          echo "Bundle size: ${JS_SIZE} bytes"
          if [ "$JS_SIZE" -gt "$MAX_SIZE" ]; then
            echo "ERROR: Bundle size exceeds 600KB limit"
            exit 1
          fi
          echo "Bundle size OK"

      - name: Stage built bundle for demo (Playwright serves demo/)
        run: cp dist/maptour.js dist/maptour.css demo/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright results on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
