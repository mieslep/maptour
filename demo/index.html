<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ennis Sculpture Trail</title>
  <meta name="description" content="A self-guided walking tour of the Ennis Sculpture Trail, powered by MapTour.">

  <!-- MapTour styles -->
  <link rel="stylesheet" href="maptour.css">

  <style>
    /* Full-page demo host styles */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #maptour {
      width: 100%;
      height: 100vh;
      height: 100dvh; /* dynamic viewport height — accounts for mobile browser chrome */
    }
  </style>
</head>
<body>
  <div id="maptour"></div>

  <!-- MapTour JS bundle -->
  <script src="maptour.js"></script>
  <script>
    MapTour.init({
      container: '#maptour',
      tourUrl: './tour.yaml',
    });
  </script>
</body>
</html>
