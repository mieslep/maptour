  - id: 9
    title: Four Minds
    coords:
      - 52.84652
      - -8.989155
    content:
      - type: text
        body: |
          Four Minds combines Christian and early Greek philosophies.
          Walk around the sculpture and study each face - the four heads
          each represent a different state of mind:

          1. **Care** - attentive concern
          2. **Tranquility and Harmony** - inner peace
          3. **Anxiety or Angst** - the restless mind
          4. **Sensuality and Totality of Being** - fully present

          The Twohigs also created "Trinity" and the two works share a 
          similar style - human forms blended with symbolic and natural 
          elements.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop10-fourminds.jpg
        caption: "\"Four Minds\" by Diarmuid Twohig & Marcel Twohig"
