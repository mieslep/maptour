  - id: 7
    title: A Fishy Tail
    coords:
      - 52.846979
      - -8.988706
    content:
      - type: text
        body: |
          This limestone sculpture suggests a fish leaping out of the water.
          Its position inside the fountain at the Maid of Erin roundabout
          highlights the aquatic theme perfectly.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop8-fishtail.jpg
        caption: "\"A Fishy Tail\" by Carmel Doherty"
      - type: text
        body: |
          Opposite the fountain stands the **Maid of Erin**, a monument
          erected in 1897 to commemorate the Manchester Martyrs - three
          Fenians executed in 1867. The Maid of Erin figure, representing
          Ireland, stands atop a tall limestone column. These monuments
          were popular across Ireland in the late 19th century as symbols
          of Irish nationalism, and the Ennis example remains one of the
          best preserved.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop8-maidoferin.jpg
        caption: The Maid of Erin monument (1897)
