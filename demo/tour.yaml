# Ennis Sculpture Trail — Self-Guided Walking Tour
# Waypoint order taken directly from Sculpture Trail.gpx (s13 → s14 → … → s1)
# Coordinates: Ennis, Co. Clare, Ireland (~52.844°N, 8.985°W)

tour:
  id: ennis-sculpture-trail
  title: Ennis Sculpture Trail
  description: >
    A self-guided walking tour of the Ennis Sculpture Trail. Discover public artworks
    placed throughout the town and its riverside paths, each with its own story.
  duration: "Approx. 90 minutes on foot"
  nav_mode: walk
  close_url: "https://visitennis.ie"
  welcome:
    - type: text
      body: |
        Welcome to the Ennis Sculpture Trail!

        This self-guided tour takes you to each sculpture in the order of the
        signed trail. Each stop includes information about the artwork and the
        artist.

        **Tips for your walk:**
        - Wear comfortable shoes — some sections follow riverside paths
        - Allow about 90 minutes at a relaxed pace
        - Use the navigation button at each stop for walking directions
    - type: image
      url: https://placehold.co/800x400/1d4ed8/ffffff?text=Ennis+Sculpture+Trail
      caption: Ennis town centre and the River Fergus
  goodbye:
    - type: text
      body: |
        You have completed the Ennis Sculpture Trail — well done!

        We hope you enjoyed discovering the artworks woven into the fabric of
        Ennis. For more information about the artists and the trail, visit
        visitennis.ie.

