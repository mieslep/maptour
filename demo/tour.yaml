          content:
            - type: text
              body: |-
                Continue along the river for about 75 metres, where you will cross over two roadways on your way between two buildings. 
                 
                You will pass through Enright's Bow, one of Ennis's 
                characteristic "bow-ways" - arched passageways that connect
                the town's main streets to the lanes and yards behind. 
                These medieval passages originally gave access to the long 
                narrow plots of land(burgage plots) that ran behind the 
                street-front buildings, where merchants kept workshops, stores, 
                and kitchen gardens.

                Ennis restored and reopened many of these laneways
                and bow-ways as part of a town renewal initiative, turning
                forgotten back passages into attractive pedestrian routes that
                reveal the town's historic street pattern.
            - type: image
              url: https://images.ennistidytowns.ie/sculpture/journey-12to13-bowway.jpg
              caption: Enright's Bow - one of Ennis's restored bowways
            - type: text
              body: Many of these bow-ways have artwork, including this dedication to Ennis native Laura Brennan who, upon learning at the age of 25 learned her cervical cancer was terminal dedicated the rest of her life as a campaigner for HPV vaccination. Laura died 20th March 2019, at just 26 years of age.
            - type: image
              url: https://images.ennistidytowns.ie/sculpture/enright-bow-laura-brennan.jpg
              caption: Mural dedicated to Laura Brennan, Enright's Bow
  - id: 13
    title: Weathered Woman
    coords:
      - 52.842067
      - -8.984443
    content:
      - type: text
        body: |
          This limestone lady on Barrack Street represents all of us
          "weathered" by life. She provides a spot where you can sit, read,
          or just relax - take a moment if you need one.

          Jose Croft was educated in Australia and finds great inspiration
          in Ireland's rich heritage of ancient stonework. The worn,
          textured surface of this piece is deliberate - the weathering
          is part of the meaning, a reminder that time leaves its mark
          on all of us.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop14-weathered.jpg
        caption: "\"Weathered Woman\" by Jose Croft (1998)"
