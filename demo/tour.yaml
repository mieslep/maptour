          text: |-
            Return back in the direction you came from, turning right up the main street. 

            You are walking up O'Connell Street, the main street of Ennis.
            Lined with colourful shopfronts and pubs, this pedestrianised
            street is the commercial heart of the town.

            At the top of the street stands the **O'Connell Monument**, a
            tall column erected in 1867 to honour Daniel O'Connell, "The
            Liberator". O'Connell was elected MP for Clare in 1828 in a
            landmark by-election held in Ennis - his victory forced the
            British government to pass Catholic Emancipation the following
            year, allowing Catholics to sit in Parliament for the first
            time. The connection between O'Connell and Ennis is one of the
            most significant in Irish political history.

            The square at the top of the street is known locally as
            "The Height".
