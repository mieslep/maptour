tour:
  schema_version: "1.0"
  id: ennis-sculpture-trail
  title: Ennis Sculpture Trail
  description: |
    A self-guided walking tour of the Ennis Sculpture Trail. Discover public artworks placed throughout the town and its riverside paths, each with its own story.
  duration: 2.5 km / approx. 45 minutes
  nav_mode: walk
  close_url: https://visitennis.ie
  welcome:
    - type: text
      body: |-
        Welcome to the **Ennis Sculpture Trail** — a short walking route through the heart of Ennis, County Clare.

        Launched in 1997, the trail set out to do something simple but unusual: to make sculpture part of everyday life in the town. Over the years, additional works have been introduced, creating a trail that continues to grow and change.

        Along the way, you’ll find pieces that surprise, provoke, and invite curiosity — whether you’re seeing them for the first time or passing them again with fresh eyes.
    - type: image
      url: https://images.ennistidytowns.ie/sculpture/1997-sculpture-trail-marker.jpg
      caption: Marker of the original Sculpture Train (1997)
    - type: text
      body: |
        Today the expanded trail weaves along the River Fergus, through medieval
        laneways, and across the town's main streets. The sculptures
        celebrate Clare's culture, history, sport, and the bond between
        people and nature.

        We hope you enjoy this stroll through our town!
  goodbye:
    - type: text
      body: |
        You have completed the Ennis Sculpture Trail - well done!

        You have walked 2.5 km through the heart of Ennis, passing works
        of public art spanning almost three decades - from the original
        1997 trail to the Centurial Sphere unveiled in 2016.

        The trail was the vision of sculptor Carmel Doherty, who believed
        that contemporary art belonged in everyday public spaces, not just
        galleries. The artists who created these works have left a lasting
        mark on the town.

        For more about Ennis and what else to see, visit
        [visitennis.ie](https://visitennis.ie).
  getting_here:
    - type: text
      body: The tour starts near "Club Bridge" in Ennis. The nearest carpark is "GAA Cloister Carpark" off Abbey Street; you may find on-street parking in Lifford (near Lifford Lighting or Peril's Furniture) or on College Road (particularly when school is not meeting).
  require_scroll: true
stops:
  - id: 1
    title: Trinity
    coords:
      - 52.846411
      - -8.982617
    content:
      - type: text
        body: |
          Your tour begins at Club Bridge with one of the original trail
          sculptures. Trinity is a triangular piece where each of the three
          corners is formed into a human figure, but look closely - each
          head features animal elements too. The sculptors sought to express
          the bond between nature and man.

          This was part of the first Ennis Sculpture Trail, a project
          spearheaded by sculptor Carmel Doherty in 1997. Five artists
          created the trail together, several of them carving stone for
          the first time.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop1-sculpture.jpg
        caption: "\"Trinity\" by Diarmuid Twohig & Marcel Twohig"
