            - type: text
              body: |-
                It was here, in 1997, that the idea for a public sculpture trail in Ennis first took shape. What you see around you began as a shared experiment — a group of artists coming together to create something new for the town.

                The works that formed the original trail were created by sculptor Carmel Doherty and fellow artists Diarmuid O'Twohig, Fiona O'Dwyer, Shane Gilmore, Barry Wrafter, and Colin Grehan.

                Several were working in stone for the first time. They learned as they went — shaping not just the sculptures, but the trail itself.
  - id: 11
