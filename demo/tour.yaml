# Enniscorthy Tidy Towns 2025 — Guided Tour
# A self-guided walking tour of this year's community projects
# Coordinates are centred on Enniscorthy, Co. Wexford, Ireland (52.5022°N, 6.5581°W)

tour:
  id: enniscorthy-tidy-towns-2025
  title: Enniscorthy Tidy Towns 2025
  description: >
    Discover the community projects that earned Enniscorthy its 2025 Tidy Towns commendation.
    This self-guided tour takes you from the castle grounds to the River Slaney,
    through our heritage trail and community gardens.
  duration: "Approx. 90 minutes on foot"
  nav_mode: walk

stops:
  - id: 1
    title: Enniscorthy Castle Grounds
    coords: [52.50185, -6.55820]
    content:
      - type: text
        body: |
          ## Castle Grounds Restoration

          The Norman castle at the heart of Enniscorthy has stood for over 800 years,
          and this year our volunteers gave its grounds a complete overhaul.

          Working with Wexford County Council, we cleared decades of ivy from the
          perimeter walls, re-laid the cobbled pathways, and planted native wildflower
          meadow patches along the south-facing bank.

          **What was done this year:**
          - 120 metres of perimeter stonework cleaned and repointed
          - Native wildflower seed mix sown across 200 m²
          - New heritage interpretation signage installed at four points
          - Drainage channel cleared to prevent winter flooding
      - type: image
        url: https://placehold.co/800x500/2563eb/ffffff?text=Castle+Grounds
        caption: The restored south grounds in early summer bloom
      - type: gallery
        images:
