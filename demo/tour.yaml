  - id: 3
    title: Contentment is Wealth
    coords:
      - 52.844562
      - -8.983567
    content:
      - type: text
        body: |
          Named after the traditional Irish jig **Contentment is Wealth**,
          this pair of limestone sculptures plays on the idea of music made
          visible. One sculpture shows a fiddler mid-performance, while the
          other is a carved stone chair, inviting you to pause, sit, and
          imagine the tune.

          Together, the two pieces celebrate Ennis's strong tradition of
          music, performance, and informal gathering.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop4-fiddler.jpg
        caption: The fiddler - "Contentment is Wealth" by Fiona O'Dwyer (1998)
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop4-chair.jpg
        caption: The stone chair - "Contentment is Wealth" by Fiona O'Dwyer (1998)
