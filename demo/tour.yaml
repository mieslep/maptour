            caption: Volunteers at the community planting day, February 2025
          - url: https://placehold.co/800x500/14532d/ffffff?text=Hawthorn+Saplings
            caption: Young hawthorn saplings in their first spring growth
    leg_to_next:
      mode: drive
      note: "Return down to town and head for the station, ~7 min"

  - id: 6
    title: Enniscorthy Railway Station — Gateway Project
    coords: [52.50650, -6.56200]
    content:
      - type: text
        body: |
          ## Railway Station Gateway Project

          The railway station is the first thing many visitors see of Enniscorthy —
          and this year it received the most visible transformation of any Tidy Towns
          project in recent memory.

          Working with Irish Rail and the local Lions Club, we completely replanted
          the station forecourt and approach road with a colourful mix of seasonal
          bedding and hardy perennials. The result? Three hundred hanging baskets
          and a floral arch over the main entrance that became a social media
          sensation in June.

          **Project facts:**
          - 300 hanging baskets maintained throughout the season
          - Forecourt planters replanted twice (spring and autumn)
          - Floral arch: 8 metres wide, trained over 6 months
          - Litter management: daily morning sweep by station volunteers

          The station won the Irish Rail "Best Dressed Station" award 2025 for
          the midlands and southeast region.
      - type: image
        url: https://placehold.co/800x500/2563eb/ffffff?text=Station+Floral+Arch
