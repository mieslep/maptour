    leg_to_next:
      mode: walk
      note: "Walk down Castle Hill to the river, ~6 min"

  - id: 2
    title: River Slaney Cleanup & Wildflower Bank
    coords: [52.50290, -6.55650]
    content:
      - type: text
        body: |
          ## River Slaney Riverside Restoration

          The River Slaney towpath has been transformed this year by a dedicated team
          of volunteers who gave up twelve Saturday mornings to clear litter,
          remove invasive Japanese knotweed, and establish a native wildflower bank
          along a 400-metre stretch.

          The project was supported by the National Parks and Wildlife Service,
          who provided native plant plug stock and technical advice on
          knotweed removal.

          > *"The river bank looks better now than it has in thirty years."*
          > — Cllr. Mary O'Brien, Enniscorthy Area

          **Project highlights:**
          - 400 m of riverbank cleared of invasive species
          - 800 native plug plants installed (cowslip, meadowsweet, purple loosestrife)
          - 3 access points improved with gravel and timber edging
          - Litter bags collected: 47
      - type: image
        url: https://placehold.co/800x500/16a34a/ffffff?text=River+Slaney+Bank
        caption: The newly planted riverside wildflower bank, April 2025
    leg_to_next:
      mode: walk
      note: "Follow the riverside path north, ~8 min"

  - id: 3
    title: Abbey Square Heritage Planting
    coords: [52.50390, -6.55750]
    content:
      - type: text
        body: |
          ## Abbey Square — A Living Heritage Garden

          Abbey Square has been the commercial heart of Enniscorthy since medieval times.
          This year we partnered with local businesses to transform the central planting
          beds into a heritage garden celebrating Wexford's botanical history.

          Each of the twelve raised beds is planted with species that would have been
          grown in a medieval herb garden: lavender, rosemary, thyme, woad, and
          marigold — with interpretation plaques explaining their historical uses.

          The project took five months from design to planting, with local schoolchildren
          helping to sow seeds as part of the Tidy Towns education programme.
