  - id: 16
    title: Celtic Rest
    coords:
      - 52.844034
      - -8.981866
    content:
      - type: text
        body: |
          The next stop on the trail is this striking chair constructed
          from oak and limestone. It brings together sculptural design and
          practical function - a work of art that also invites you to sit.

          Take a seat if you like - it is, after all, a place of rest.
          From here you are just a short walk back to O'Connell Street
          and the centre of town.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop16-celticrest.jpg
        caption: "\"Celtic Rest\" by Rory McNamara (2004)"
