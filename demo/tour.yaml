  - id: 5
    title: Vinegar Hill Tree Planting Scheme
    coords: [52.50180, -6.54900]
    content:
      - type: text
        body: |
          ## Vinegar Hill — 1798 Memorial Grove

          Vinegar Hill is one of Ireland's most significant historic sites —
          the location of the final stand of the 1798 United Irishmen rebellion.
          The windmill tower at the summit is a national monument.

          This year, as part of the national Tidy Towns tree planting initiative,
          Enniscorthy Tidy Towns planted 40 native trees on the lower slopes:
          hawthorn, blackthorn, rowan, and wild cherry — species that would have
          been common on Wexford hillsides two centuries ago.

          The planting was carried out with guidance from Coillte and the Tree
          Council of Ireland, with each tree individually staked and guarded.
          Survival rate after year one: 95%.

          > *"These trees will still be standing when the next generation walks this hill."*
          > — John Furlong, Enniscorthy Tidy Towns Chair
      - type: image
        url: https://placehold.co/800x500/15803d/ffffff?text=Vinegar+Hill+Grove
        caption: Native tree planting on the lower slopes of Vinegar Hill
      - type: gallery
        images:
