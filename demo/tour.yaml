  - id: 8
    title: Memory of Meaning
    coords:
      - 52.846547
      - -8.989682
    content:
      - type: text
        body: |
          This piece celebrates Clare's historic win in the All-Ireland
          Senior Hurling Championship final of 1995. 

          Clare had not won an All-Ireland hurling title since its first in 
          1914 - an 81-year wait. When Ger Loughnane's team defeated Offaly 
          in the final, the county erupted. This sculpture by the River 
          Fergus stands as a tribute to that victory and to the generations 
          of supporters who waited for it.

          Clare has gone on to win the Liam McCarthy cup three more times 
          since then (1997, 2013, and 2024) — Hon the Banner!
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop9-memory.jpg
        caption: "\"Memory of Meaning\" by Colin Grehan & Barry Wrafter"
