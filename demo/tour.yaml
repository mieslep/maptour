  - id: 17
    title: The Centurial Sphere & Easter Rising Memorial
    coords:
      - 52.846129
      - -8.981962
    content:
      - type: text
        body: |
          Located at Club Bridge, this stop features two commemorative pieces
          marking the Easter Rising.

          The **Easter Rising Memorial Stone** was erected in 1966 to mark
          the 50th anniversary of the 1916 Rising.

          **The Centurial Sphere** (2016), designed and crafted by Paddy and
          Conor Murray of Kilkee Forge, was commissioned by Clare County
          Council as the centrepiece of its Centenary Programme in Clare.
          The illuminated steel sphere carries lines from poems and songs
          about and from different parts of Clare, celebrating the county's
          cultural tradition - a tradition cherished by the men and women
          of 1916.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop2-sphere.jpg
        caption: "The Centurial Sphere (2016) by Paddy Murray. The steel is galvanized and lacquered to give it a patinated copper or verdigris appearance. "
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop2-memorial.jpg
        caption: Easter Rising Memorial Stone (1966)
