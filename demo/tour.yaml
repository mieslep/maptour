    title: Dreamboat
    coords:
      - 52.846404
      - -8.988386
    content:
      - type: text
        body: |
          Carved from Kilkenny limestone, Dreamboat consists of a boat
          with a cross above it. Look closely and you will find little
          drawings carved into the stone - a star map, a dress, a heart.
          Everyone can interpret the symbols in their own way.

          O'Dwyer also created "Contentment is Wealth". Her work
          on the trail combines figurative imagery with symbols that invite
          personal interpretation.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop11-dreamboat.jpg
        caption: "\"Dreamboat\" by Fiona Dwyer"
