  - id: 14
    title: Hands
    coords:
      - 52.842014
      - -8.983296
    content:
      - type: text
        body: |
          Positioned outside the Cathedral of Saints Peter and Paul, this
          sculpture takes the form of two large clasped hands that also
          serve as a seat. The work suggests welcome, care, reflection,
          and support - fitting themes for its setting beside one of
          Ennis's most important buildings.

          Added to the trail in 2008, it shows how Ennis's public art
          story continued to grow beyond the original sculptures of the
          late 1990s.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop15-hands.jpg
        caption: "\"Hands\" by Shane Gilmore (2008)"
