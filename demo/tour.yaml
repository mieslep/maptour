  - id: 15
    title: Sisters of Mercy
    coords:
      - 52.84415467400237
      - -8.982054965168928
    content:
      - type: text
        body: |-
          This work was sponsored by Ennis Tidy Towns and commemorates the arrival of the Sisters of Mercy to Ennis in 1854. 

          Nowel Crowley, then-chairperson of Ennis Tidy Towns, said “[We] have sponsored this particular piece and really it is in commemoration of Mother Catherine McAuley and the inspiration she gave by giving up her fortune to help the poor. The Sisters came to Ennis in 1854 to work with the poor here."
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/sisters-of-mercy.jpg
        caption: Dedication to the Sisters of Mercy by Barry Wrafter (2011)
      - type: text
        body: |-
          This statue has become [somewhat controversial](https://www.independent.ie/irish-news/its-distortion-of-history-locals-call-for-statue-dedicated-to-sisters-of-mercy-to-be-removed/36039387.html) in the wake of the Ryan Report; whilst the Sisters of Mercy undoubtedly did good works in Ennis, the location of this monument is also near the site of the former Industrial School and laundry, both run by the Sisters. 

          Named St. Brigid's Laundry (and not a Magdalene laundry), it was initially established for private use by the convent and eventually became a public laundry servicing the town. It employed women and girls from the town (no doubt they were not paid much and it could be hard and unpleasant work) and was used to train the industrial school girls in laundry skills. 

          More information on this can be found on Dr. Jane O'Brien's [blog post](https://enniswalkingtours.com/the-history-of-the-industrial-school-child-in-ennis); Jane also conducts a variety of walking tours of Ennis, the details of which you may find on the same website!
      - type: text
        body: "You might also spot, to the left, some interesting-looking artwork that incorporates some of the building structure. "
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/wall-candy.jpg
        caption: Warriors by Will Gilchrist (2010, 2021)
      - type: text
        body: "[Wallcandy](https://clarechampion.ie/town-becomes-a-canvass-for-wallcandy) was a street art project initiated in 2010 and managed by Ennis Street Arts Festival. Intended to last 6 months, many of the works remain and are treasured by the Ennis community."
