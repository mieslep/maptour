  - id: 4
    title: Templeshannon Community Garden
    coords: [52.50520, -6.55900]
    content:
      - type: text
        body: |
          ## Templeshannon Community Garden

          Opened in 2023 on a formerly derelict site on the Templeshannon side of
          the river, the community garden is now in its third growing season —
          and this year it really hit its stride.

          The garden has 24 raised beds allocated to local families, a polytunnel
          for year-round growing, a composting area, and a children's sensory garden
          complete with a bug hotel and a log-pile habitat.

          **2025 additions:**
          - 6 new raised beds for the waiting list
          - Solar-powered water pump reducing mains usage by 80%
          - Orchard section planted with 12 Irish heritage apple varieties
          - Weekly skills sessions: composting, seed saving, crop rotation

          The garden is open to the public every weekend, 10am–5pm.
      - type: image
        url: https://placehold.co/800x500/16a34a/ffffff?text=Community+Garden
