  - id: 12
    title: Market Day
    coords:
      - 52.843121
      - -8.984797
    content:
      - type: text
        body: |
          In Ennis Market Square, this scene shows two farmers negotiating
          the sale of a cow, with a faithful dog alongside. It captures the
          old market trading culture that was central to Ennis life for
          centuries. The town held its charter market here, and cattle fairs
          were a regular feature well into the 20th century.

          This sculpture replaced the older Icarus statue on the roundabout
          and has become one of the most recognisable pieces in Ennis.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop13-marketday.jpg
        caption: "\"Market Day\" by Barry Wrafter (c. 2012)"
