        - coords:
            - 52.84584501210068
            - -8.981748008408708
          text: ""
          journey_card: true
          content:
            - type: text
              body: On your way to the final stop of the tour stands a building known locally as “The Abbey” — the remains of a medieval Franciscan friary.
            - type: image
              url: https://images.ennistidytowns.ie/sculpture/abbey.jpg
              caption: Ennis Franciscan Friary
            - type: text
              body: |-
                Founded by the O’Briens of Thomond in the 13th century, it grew into a major centre of learning and religious life in north Munster, and was among the last Catholic schools of theology to survive the Reformation.

                Inside, the friary holds an exceptional collection of 15th- and 16th-century limestone carvings, including St Francis bearing the stigmata and a striking image of Christ with his hands bound.

                Today, the site is cared for by the Office of Public Works and is open to visitors — a rare opportunity to step inside and experience these carvings up close. More details can be found on the official site: [Visit Ennis Friary](https://heritageireland.ie/places-to-visit/ennis-friary)
