          content:
            - type: text
              body: |-
                As you continue to walk along the River Fergus, you are following the waterway that gave Ennis its name. "Inis" in Irish means island - the town grew up around a small island in the river where a Franciscan friary was founded in the 1240s.

                The Fergus is the longest river in County Clare, flowing south from the Burren to the Shannon Estuary. It has shaped the town for nearly 800 years.
            - type: image
              url: https://images.ennistidytowns.ie/sculpture/journey-11to12-fergus.jpg
              alt: view of the River Fergus
            - type: text
              body: Across the water you can see Post Office Field, an important part of the flood plain. In summer it becomes a nesting ground for many bird species.
  - id: 12
    title: Market Day
    coords:
      - 52.843121
      - -8.984797
    content:
      - type: text
        body: |
          In Ennis Market Square, this scene shows two farmers negotiating
          the sale of a cow, with a faithful dog alongside. It captures the
          old market trading culture that was central to Ennis life for
          centuries. The town held its charter market here, and cattle fairs
          were a regular feature well into the 20th century.

          This sculpture replaced the older Icarus statue on the roundabout
          and has become one of the most recognisable pieces in Ennis.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop13-marketday.jpg
        caption: "\"Market Day\" by Barry Wrafter (c. 2012)"
