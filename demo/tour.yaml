  - id: 13
    title: Weathered Woman
    coords:
      - 52.842067
      - -8.984443
    content:
      - type: text
        body: |
          This limestone lady on Barrack Street represents all of us
          "weathered" by life. She provides a spot where you can sit, read,
          or just relax - take a moment if you need one.

          Jose Croft was educated in Australia and finds great inspiration
          in Ireland's rich heritage of ancient stonework. The worn,
          textured surface of this piece is deliberate - the weathering
          is part of the meaning, a reminder that time leaves its mark
          on all of us.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop14-weathered.jpg
        caption: "\"Weathered Woman\" by Jose Croft (1998)"
