  - id: 5
    title: Clara
    coords:
      - 52.845447
      - -8.985658
    content:
      - type: text
        body: |
          On the corner of Bindon Street, "Clara" is a limestone lady
          reclining gracefully and resting on her elbows. Carmel used
          diamond-tipped tools to achieve the smooth, glossy finish -
          the same technique she applied to "A Fishy Tale" at stop 8.

          Carmel Doherty was the driving force behind the entire Ennis
          Sculpture Trail. In 1997 she organised the first trail, bringing
          together five artists to create permanent public art in Ennis.
          Before that, she had run a temporary sculpture trail in Dromore
          Woods in 1996, which proved so popular that thousands of brochures
          were picked up in the first month.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop6-clara.jpg
        caption: "\"Clara\" by Carmel Doherty"
