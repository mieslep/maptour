            - type: text
              body: |-
                For the 2010 Ennis Street Art Festival local artist Tim Humphreys created a piece of art depicting a tightrope walker walking across electrical cables on the gable end of a building two stories up. However, in 2019, the piece of art was removed as the material used had deteriorated.  Ennis Tidy Towns along with the Ennis Chamber supported Tim in recreating his piece with more durable material and we are delighted to say that the art piece was reinstated. 

                This was a collaboration with O'Sullivan's Pharmacy, Clare Co Co/ Ennis MD staff, Ennis Chamber and of course Ennis Tidy Towns. 
        - coords:
            - 52.84483974327093
            - -8.984187992364994
          text: ""
          journey_card: true
          content:
            - type: text
              body: You are now passing through the heart of Georgian Ennis. Ennis grew rapidly in the 18th and early 19th centuries as a market town and parliamentary borough.            Many of these terraced houses date from that period, built for the merchants and professionals who served the town's thriving economy. Bindon Street is one of Clare's best surviving Georgian streetscapes.
            - type: image
              url: https://images.ennistidytowns.ie/sculpture/journey-5to6-georgian.jpg
