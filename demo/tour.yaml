  - id: 15
    title: Sisters of Mercy
    coords:
      - 52.84415467400237
      - -8.982054965168928
    content:
      - type: text
        body: |-
          This work was sponsored by Ennis Tidy Towns and commemorates the arrival of the Sisters of Mercy to Ennis in 1854. 

          Nowel Crowley, then-chairperson of Ennis Tidy Towns, said “[We] have sponsored this particular piece and really it is in commemoration of Mother Catherine McAuley and the inspiration she gave by giving up her fortune to help the poor. The Sisters came to Ennis in 1854 to work with the poor here."

          This statue has become [somewhat controversial](https://www.independent.ie/irish-news/its-distortion-of-history-locals-call-for-statue-dedicated-to-sisters-of-mercy-to-be-removed/36039387.html) in the wake of the Ryan Report; whilst the Sisters of Mercy undoubtedly did good works in Ennis, the location of this monument is also on the site of the former Industrial School and Magdalene laundry. 
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/sisters-of-mercy.jpg
        caption: Dedication to the Sisters of Mercy by Barry Wrafter (2011)
