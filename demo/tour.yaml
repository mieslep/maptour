  - id: 2
    title: Bláth na hÍnse
    coords:
      - 52.845193090728294
      - -8.983077952914941
    content:
      - type: text
        body: |
          This striking sculpture was unveiled to celebrate Ennis topping the
          IBAL Anti-Litter League. Located in Abbey Street car park, the
          centrepiece is a giant Yellow Iris - a wildflower associated with
          riverbanks and wet ground, hinting at the blooming of Ennis from a
          business, community and cultural perspective.

          Three steel benches surround the Iris, which rises from a flowerbed
          filled with wildflowers and is illuminated at night.
      - type: image
        url: https://images.ennistidytowns.ie/sculpture/stop3-sculpture.jpg
        caption: "\"Bláth na hÍnse\" by Conor & Paddy Murray, Kilkee Forge"
