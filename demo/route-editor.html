<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapTour Route Editor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; display: flex; height: 100vh; }
#map { flex: 1; }
#panel {
  width: 320px; padding: 12px; overflow-y: auto;
  background: #f8f9fa; border-left: 1px solid #ddd;
}
h2 { font-size: 14px; margin-bottom: 8px; }
.seg-btn {
  display: block; width: 100%; text-align: left; padding: 6px 10px;
  margin-bottom: 4px; border: 1px solid #ccc; border-radius: 4px;
  background: white; cursor: pointer; font-size: 13px;
}
.seg-btn:hover { background: #e8f0fe; }
.seg-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
.info { font-size: 12px; color: #666; margin: 8px 0; line-height: 1.5; }
.actions { margin: 12px 0; }
.actions button {
  padding: 6px 12px; margin-right: 6px; margin-bottom: 6px;
  border: 1px solid #ccc; border-radius: 4px; background: white;
  cursor: pointer; font-size: 12px;
}
.actions button:hover { background: #e8f0fe; }
.actions button.danger { color: #dc2626; }
.actions button.primary { background: #2563eb; color: white; border-color: #2563eb; }
#status { font-size: 12px; color: #16a34a; margin: 8px 0; min-height: 20px; }
pre#output {
  font-size: 11px; background: #1e293b; color: #e2e8f0;
  padding: 8px; border-radius: 4px; max-height: 300px;
  overflow: auto; white-space: pre-wrap; word-break: break-all;
  display: none;
}
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h2>MapTour Route Editor</h2>
  <div class="info">
    <b>Quick workflow:</b> Smooth → Reduce → fine-tune.<br>
    <b>Click</b> point to select (red). <b>Drag</b> to move.<br>
    <b>Delete/Backspace</b> removes selected point.<br>
    <b>Click line</b> to insert a point. <b>Drag green stops</b> to adjust.
  </div>
  <div class="actions">
    <button onclick="undoAction()">Undo (Ctrl+Z)</button>
    <button onclick="redoAction()">Redo (Ctrl+Y)</button>
    <button onclick="smoothSegment()">Smooth</button>
    <button onclick="reducePoints()">Reduce pts</button>
    <button onclick="addPoints()">Add pts</button>
    <button class="primary" onclick="exportYAML()">Export YAML</button>
    <button onclick="exportAll()">Export All Segments</button>
    <button onclick="saveProject()">Save Project</button>
  </div>
  <div class="actions">
    <label style="font-size:12px;">Load project or GPX:
      <input type="file" id="fileInput" accept=".json,.gpx" onchange="loadFile(event)" style="font-size:11px; margin-top:4px; display:block;">
    </label>
  </div>
  <div id="status"></div>
  <h2>Segments</h2>
  <div id="seg-list"></div>
  <pre id="output"></pre>
</div>

<script>
let DATA;
let map;
let currentSeg = null;
let markers = [];
let polyline = null;
let stopMarkers = [];
let selectedMarker = null;
let undoStack = [];
let redoStack = [];

// Load data - always start fresh from raw data
// Use "Save Project" to persist, "Load" to restore
fetch('editor-data.json').then(r => r.json()).then(data => {
  DATA = data;
  initMap();
  buildSegList();
  loadSegment('0');
});

function initMap() {
  map = L.map('map').setView([52.8448, -8.985], 16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom: 20
  }).addTo(map);

  // Show all stop markers (draggable)
  DATA.wpts.forEach((w, i) => {
    const m = L.circleMarker([w.lat, w.lon], {
      radius: 10, fillColor: '#16a34a', color: '#fff',
      weight: 2, fillOpacity: 0.9
    }).addTo(map);
    m.bindTooltip(`Stop ${i + 1}: ${w.name}`, { permanent: false });

    // Make stop marker draggable
    let dragging = false;
    m.on('mousedown', (e) => {
      dragging = true;
      map.dragging.disable();
      map.on('mousemove', onDrag);
      map.on('mouseup', onDragEnd);
      L.DomEvent.stopPropagation(e);
    });
    function onDrag(e) {
      if (!dragging) return;
      m.setLatLng(e.latlng);
    }
    function onDragEnd(e) {
      if (!dragging) return;
      dragging = false;
      map.dragging.enable();
      map.off('mousemove', onDrag);
      map.off('mouseup', onDragEnd);
      const ll = m.getLatLng();
      DATA.wpts[i].lat = ll.lat;
      DATA.wpts[i].lon = ll.lng;
      // Update first point of outgoing segment and last point of incoming segment
      if (i < DATA.wpts.length - 1 && DATA.raw_segments[String(i)]) {
        DATA.raw_segments[String(i)][0] = [ll.lat, ll.lng];
      }
      if (i > 0 && DATA.raw_segments[String(i - 1)]) {
        const seg = DATA.raw_segments[String(i - 1)];
        seg[seg.length - 1] = [ll.lat, ll.lng];
      }
      // Redraw current segment if affected
      if (currentSeg !== null) {
        drawSegment(DATA.raw_segments[currentSeg]);
      }
      setStatus(`Moved stop ${i + 1} to [${ll.lat.toFixed(6)}, ${ll.lng.toFixed(6)}]`);
    }

    stopMarkers.push(m);
  });

  // Keyboard handler
  document.addEventListener('keydown', (e) => {
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedMarker !== null) {
      e.preventDefault();
      deleteSelected();
    } else if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
      e.preventDefault();
      undoAction();
    } else if ((e.key === 'y' && (e.ctrlKey || e.metaKey)) ||
               (e.key === 'z' && (e.ctrlKey || e.metaKey) && e.shiftKey)) {
      e.preventDefault();
      redoAction();
    }
  });
}

function buildSegList() {
  const list = document.getElementById('seg-list');
  for (let i = 0; i < DATA.wpts.length - 1; i++) {
    const btn = document.createElement('button');
    btn.className = 'seg-btn';
    btn.dataset.seg = i;
    const pts = DATA.raw_segments[i].length;
    btn.textContent = `${i+1} → ${i+2}: ${DATA.wpts[i].name.substring(0,20)} (${pts} pts)`;
    btn.onclick = () => loadSegment(String(i));
    list.appendChild(btn);
  }
}

function loadSegment(segId) {
  currentSeg = segId;
  selectedMarker = null;
  undoStack = [];

  // Highlight button
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.seg-btn[data-seg="${segId}"]`).classList.add('active');

  // Clear old markers/polyline
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (polyline) map.removeLayer(polyline);

  const pts = DATA.raw_segments[segId];
  drawSegment(pts);

  // Fit bounds
  const bounds = L.latLngBounds(pts.map(p => [p[0], p[1]]));
  map.fitBounds(bounds, { padding: [40, 40] });

  setStatus(`Segment ${parseInt(segId)+1}→${parseInt(segId)+2}: ${pts.length} points`);
}

function drawSegment(pts) {
  // Clear
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (polyline) map.removeLayer(polyline);

  // Draw polyline (clickable for inserting points)
  const latlngs = pts.map(p => [p[0], p[1]]);
  polyline = L.polyline(latlngs, {
    color: '#2563eb', weight: 3, opacity: 0.6
  }).addTo(map);

  polyline.on('click', (e) => {
    // Insert a point at the clicked location
    const clickLatLng = e.latlng;
    const pts = DATA.raw_segments[currentSeg];

    // Find nearest segment
    let bestIdx = 0, bestDist = Infinity;
    for (let i = 0; i < pts.length - 1; i++) {
      const d = distToSegment(clickLatLng, pts[i], pts[i+1]);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }

    saveUndo();
    pts.splice(bestIdx + 1, 0, [clickLatLng.lat, clickLatLng.lng]);
    drawSegment(pts);
    setStatus(`Inserted point after index ${bestIdx}. ${pts.length} points.`);
  });

  // Draw draggable point markers
  pts.forEach((pt, idx) => {
    const m = L.circleMarker([pt[0], pt[1]], {
      radius: 5, fillColor: '#2563eb', color: '#fff',
      weight: 1.5, fillOpacity: 0.8, draggable: true
    }).addTo(map);

    // Make draggable via mouse events
    let dragging = false;
    m.on('mousedown', (e) => {
      dragging = true;
      selectedMarker = idx;
      highlightSelected();
      map.dragging.disable();
      map.on('mousemove', onDrag);
      map.on('mouseup', onDragEnd);
      L.DomEvent.stopPropagation(e);
    });

    function onDrag(e) {
      if (!dragging) return;
      m.setLatLng(e.latlng);
      pts[idx] = [e.latlng.lat, e.latlng.lng];
      polyline.setLatLngs(pts.map(p => [p[0], p[1]]));
    }

    function onDragEnd() {
      if (!dragging) return;
      dragging = false;
      map.dragging.enable();
      map.off('mousemove', onDrag);
      map.off('mouseup', onDragEnd);
      saveUndo();
      setStatus(`Moved point ${idx}. ${pts.length} points.`);
    }

    m.on('click', (e) => {
      selectedMarker = idx;
      highlightSelected();
      setStatus(`Selected point ${idx} of ${pts.length}`);
      L.DomEvent.stopPropagation(e);
    });

    markers.push(m);
  });
}

function highlightSelected() {
  markers.forEach((m, i) => {
    m.setStyle({
      fillColor: i === selectedMarker ? '#dc2626' : '#2563eb',
      radius: i === selectedMarker ? 7 : 5
    });
  });
}

function deleteSelected() {
  if (selectedMarker === null || currentSeg === null) return;
  const pts = DATA.raw_segments[currentSeg];
  if (pts.length <= 2) { setStatus('Cannot delete - minimum 2 points'); return; }

  saveUndo();
  pts.splice(selectedMarker, 1);
  selectedMarker = null;
  drawSegment(pts);
  updateSegButton();
  setStatus(`Deleted. ${pts.length} points remaining.`);
}

function saveUndo() {
  undoStack.push(JSON.parse(JSON.stringify(DATA.raw_segments[currentSeg])));
  if (undoStack.length > 50) undoStack.shift();
  redoStack = []; // clear redo on new action
}

function undoAction() {
  if (!undoStack.length || currentSeg === null) return;
  redoStack.push(JSON.parse(JSON.stringify(DATA.raw_segments[currentSeg])));
  DATA.raw_segments[currentSeg] = undoStack.pop();
  selectedMarker = null;
  drawSegment(DATA.raw_segments[currentSeg]);
  updateSegButton();
  setStatus('Undone. ' + DATA.raw_segments[currentSeg].length + ' points.');
}

function redoAction() {
  if (!redoStack.length || currentSeg === null) return;
  undoStack.push(JSON.parse(JSON.stringify(DATA.raw_segments[currentSeg])));
  DATA.raw_segments[currentSeg] = redoStack.pop();
  selectedMarker = null;
  drawSegment(DATA.raw_segments[currentSeg]);
  updateSegButton();
  setStatus('Redone. ' + DATA.raw_segments[currentSeg].length + ' points.');
}

function saveProject() {
  // Save to localStorage
  localStorage.setItem('maptour-editor-project', JSON.stringify(DATA));
  // Also download as file
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'maptour-routes-project.json'; a.click();
  URL.revokeObjectURL(url);
  setStatus('Project saved to browser storage and downloaded.');
}

function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    if (file.name.endsWith('.gpx')) {
      loadGPX(text);
    } else {
      // JSON project file
      try {
        const data = JSON.parse(text);
        if (data.wpts && data.raw_segments) {
          DATA = data;
          // Clear map and rebuild
          stopMarkers.forEach(m => map.removeLayer(m));
          stopMarkers = [];
          markers.forEach(m => map.removeLayer(m));
          markers = [];
          if (polyline) map.removeLayer(polyline);
          document.getElementById('seg-list').innerHTML = '';
          DATA.wpts.forEach((w, i) => {
            const m = L.circleMarker([w.lat, w.lon], {
              radius: 10, fillColor: '#16a34a', color: '#fff',
              weight: 2, fillOpacity: 0.9
            }).addTo(map);
            m.bindTooltip('Stop ' + (i+1) + ': ' + w.name, { permanent: false });
            stopMarkers.push(m);
          });
          buildSegList();
          loadSegment('0');
          setStatus('Loaded project: ' + file.name);
        } else {
          setStatus('Invalid project file - missing wpts or raw_segments');
        }
      } catch (err) {
        setStatus('Error loading file: ' + err.message);
      }
    }
  };
  reader.readAsText(file);
}

function loadGPX(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const ns = 'http://www.topografix.com/GPX/1/1';

  // Extract waypoints
  const wptEls = doc.getElementsByTagNameNS(ns, 'wpt');
  const wpts = [];
  for (const w of wptEls) {
    const nameEl = w.getElementsByTagNameNS(ns, 'name')[0];
    wpts.push({
      lat: parseFloat(w.getAttribute('lat')),
      lon: parseFloat(w.getAttribute('lon')),
      name: nameEl ? nameEl.textContent : '?'
    });
  }

  // Extract track points
  const trkpts = [];
  const trkptEls = doc.getElementsByTagNameNS(ns, 'trkpt');
  for (const pt of trkptEls) {
    trkpts.push([parseFloat(pt.getAttribute('lat')), parseFloat(pt.getAttribute('lon'))]);
  }

  if (!wpts.length || !trkpts.length) {
    setStatus('GPX must contain waypoints and a track.');
    return;
  }

  // Snap waypoints to track
  function haversine(a, b) {
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dlat = toRad(b[0]-a[0]), dlon = toRad(b[1]-a[1]);
    const h = Math.sin(dlat/2)**2 + Math.cos(toRad(a[0]))*Math.cos(toRad(b[0]))*Math.sin(dlon/2)**2;
    return R * 2 * Math.asin(Math.sqrt(h));
  }

  const snapIndices = wpts.map(w => {
    let bestIdx = 0, bestDist = Infinity;
    trkpts.forEach((pt, j) => {
      const d = haversine([w.lat, w.lon], pt);
      if (d < bestDist) { bestDist = d; bestIdx = j; }
    });
    return bestIdx;
  });

  const raw_segments = {};
  for (let i = 0; i < wpts.length - 1; i++) {
    const s = snapIndices[i], e = snapIndices[i+1];
    raw_segments[String(i)] = s <= e ? trkpts.slice(s, e+1) : trkpts.slice(e, s+1).reverse();
  }

  DATA = { wpts, raw_segments };

  // Clear and rebuild map
  stopMarkers.forEach(m => map.removeLayer(m));
  stopMarkers = [];
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (polyline) map.removeLayer(polyline);
  document.getElementById('seg-list').innerHTML = '';

  DATA.wpts.forEach((w, i) => {
    const m = L.circleMarker([w.lat, w.lon], {
      radius: 10, fillColor: '#16a34a', color: '#fff',
      weight: 2, fillOpacity: 0.9
    }).addTo(map);
    m.bindTooltip('Stop ' + (i+1) + ': ' + w.name, { permanent: false });
    stopMarkers.push(m);
  });
  buildSegList();
  loadSegment('0');

  const totalPts = Object.values(raw_segments).reduce((s, v) => s + v.length, 0);
  setStatus('Loaded GPX: ' + wpts.length + ' stops, ' + totalPts + ' track points.');
}

function smoothSegment() {
  if (currentSeg === null) return;
  saveUndo();
  const pts = DATA.raw_segments[currentSeg];
  const smoothed = [pts[0]];
  for (let i = 1; i < pts.length - 1; i++) {
    const start = Math.max(0, i - 2);
    const end = Math.min(pts.length, i + 3);
    let sumLat = 0, sumLng = 0, count = 0;
    for (let j = start; j < end; j++) {
      sumLat += pts[j][0]; sumLng += pts[j][1]; count++;
    }
    smoothed.push([sumLat / count, sumLng / count]);
  }
  smoothed.push(pts[pts.length - 1]);
  DATA.raw_segments[currentSeg] = smoothed;
  selectedMarker = null;
  drawSegment(smoothed);
  setStatus(`Smoothed. ${smoothed.length} points.`);
}

function updateSegButton() {
  const btn = document.querySelector(`.seg-btn[data-seg="${currentSeg}"]`);
  if (btn) {
    const i = parseInt(currentSeg);
    const pts = DATA.raw_segments[currentSeg].length;
    btn.textContent = `${i+1} → ${i+2}: ${DATA.wpts[i].name.substring(0,20)} (${pts} pts)`;
  }
}

function distToSegment(latlng, p1, p2) {
  const x = latlng.lat, y = latlng.lng;
  const x1 = p1[0], y1 = p1[1], x2 = p2[0], y2 = p2[1];
  const dx = x2 - x1, dy = y2 - y1;
  if (dx === 0 && dy === 0) return Math.sqrt((x-x1)**2 + (y-y1)**2);
  let t = ((x-x1)*dx + (y-y1)*dy) / (dx*dx + dy*dy);
  t = Math.max(0, Math.min(1, t));
  return Math.sqrt((x - (x1+t*dx))**2 + (y - (y1+t*dy))**2);
}

function exportYAML() {
  if (currentSeg === null) return;
  const pts = DATA.raw_segments[currentSeg];
  let yaml = '      route:\n';
  pts.forEach(pt => {
    yaml += `        - [${pt[0].toFixed(6)}, ${pt[1].toFixed(6)}]\n`;
  });
  const out = document.getElementById('output');
  out.style.display = 'block';
  out.textContent = yaml;
  navigator.clipboard.writeText(yaml).then(() => {
    setStatus('YAML copied to clipboard!');
  }).catch(() => {
    setStatus('YAML shown below (copy manually)');
  });
}

function exportAll() {
  let yaml = '# Stop coordinates\n';
  DATA.wpts.forEach((w, i) => {
    yaml += `# Stop ${i+1}: ${w.name}\n`;
    yaml += `    coords: [${w.lat.toFixed(6)}, ${w.lon.toFixed(6)}]\n\n`;
  });
  yaml += '\n# Route segments\n';
  for (let i = 0; i < DATA.wpts.length - 1; i++) {
    const pts = DATA.raw_segments[String(i)];
    yaml += `# Segment ${i+1} -> ${i+2}: ${DATA.wpts[i].name} -> ${DATA.wpts[i+1].name} (${pts.length} points)\n`;
    yaml += '      route:\n';
    pts.forEach(pt => {
      yaml += `        - [${pt[0].toFixed(6)}, ${pt[1].toFixed(6)}]\n`;
    });
    yaml += '\n';
  }
  const out = document.getElementById('output');
  out.style.display = 'block';
  out.textContent = yaml;

  // Also trigger download
  const blob = new Blob([yaml], { type: 'text/yaml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'routes.yaml'; a.click();
  URL.revokeObjectURL(url);
  setStatus('All segments (with stop coords) exported and downloaded!');
}

function reducePoints() {
  // Douglas-Peucker: keeps points on curves, removes points on straight sections
  if (currentSeg === null) return;
  saveUndo();
  const pts = DATA.raw_segments[currentSeg];
  const before = pts.length;

  function ptLineDist(pt, a, b) {
    const dx = b[0]-a[0], dy = b[1]-a[1];
    if (dx === 0 && dy === 0) return Math.sqrt((pt[0]-a[0])**2 + (pt[1]-a[1])**2);
    let t = ((pt[0]-a[0])*dx + (pt[1]-a[1])*dy) / (dx*dx + dy*dy);
    t = Math.max(0, Math.min(1, t));
    return Math.sqrt((pt[0]-(a[0]+t*dx))**2 + (pt[1]-(a[1]+t*dy))**2);
  }
  function dp(pts, tol) {
    if (pts.length <= 2) return pts;
    let maxD = 0, maxI = 0;
    for (let i = 1; i < pts.length-1; i++) {
      const d = ptLineDist(pts[i], pts[0], pts[pts.length-1]);
      if (d > maxD) { maxD = d; maxI = i; }
    }
    // tolerance in degrees (~1.5m at this latitude)
    if (maxD > tol) {
      const left = dp(pts.slice(0, maxI+1), tol);
      const right = dp(pts.slice(maxI), tol);
      return left.slice(0, -1).concat(right);
    }
    return [pts[0], pts[pts.length-1]];
  }
  // ~1.5m tolerance in degrees
  const reduced = dp(pts, 0.000015);
  DATA.raw_segments[currentSeg] = reduced;
  selectedMarker = null;
  drawSegment(reduced);
  updateSegButton();
  setStatus(`Reduced: ${before} -> ${reduced.length} points (kept curves, dropped straights).`);
}

function addPoints() {
  // Interpolate: add a midpoint between every consecutive pair
  if (currentSeg === null) return;
  saveUndo();
  const pts = DATA.raw_segments[currentSeg];
  const before = pts.length;
  const result = [pts[0]];
  for (let i = 0; i < pts.length - 1; i++) {
    result.push([(pts[i][0]+pts[i+1][0])/2, (pts[i][1]+pts[i+1][1])/2]);
    result.push(pts[i+1]);
  }
  DATA.raw_segments[currentSeg] = result;
  selectedMarker = null;
  drawSegment(result);
  updateSegButton();
  setStatus(`Interpolated: ${before} -> ${result.length} points.`);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
</script>
</body>
</html>
